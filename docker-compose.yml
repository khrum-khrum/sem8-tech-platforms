services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cdr_billing
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cdr_billing"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    image: mcr.microsoft.com/dotnet/sdk:10.0
    working_dir: /workspace
    command: >
      sh -c "dotnet restore &&
             dotnet run --project src/CdrBilling.Api --urls http://0.0.0.0:5000"
    environment:
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=cdr_billing;Username=postgres;Password=postgres
    volumes:
      - ./:/workspace
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    image: node:22-alpine
    working_dir: /app
    command: >
      sh -c "npm install &&
             npm run dev -- --host 0.0.0.0 --port 5173"
    environment:
      VITE_API_BASE_URL: http://localhost:5000
    volumes:
      - ./web:/app
      - web_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  pgdata:
  web_node_modules:
