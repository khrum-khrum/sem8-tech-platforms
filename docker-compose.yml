services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cdr_billing
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cdr_billing"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: src/CdrBilling.Api/Dockerfile
    environment:
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=cdr_billing;Username=postgres;Password=postgres
    ports:
      - "13000:13000"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    environment:
      VITE_API_BASE_URL: http://localhost:13000
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  pgdata:
